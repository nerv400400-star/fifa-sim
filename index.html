<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Anatomy View</title>
    <style>
        /* 화면 전체 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* 배경 흰색 */
            display: flex;
            justify-content: center; /* 가로 중앙 */
            align-items: center;     /* 세로 중앙 */
            overflow: hidden;        /* 스크롤 방지 */
        }

        /* 이미지 컨테이너 */
        .container {
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 인체 이미지 스타일 */
        .anatomy-image {
            max-width: 90%;  /* 화면 너비의 90%까지 */
            max-height: 90vh; /* 화면 높이의 90%까지 */
            height: auto;
            width: auto;
            object-fit: contain;
            /* 깔끔한 느낌을 위해 아주 미세한 그림자 추가 (선택 사항) */
            filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.05));
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="body.png" alt="Human Anatomy" class="anatomy-image">
    </div>

</body>
</html>
