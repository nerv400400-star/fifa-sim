<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPAIR MASTER - ORIGINAL UI</title>
    <style>
        /* === 전체 테마 (FC 온라인 스타일) === */
        :root {
            --bg-body: #121212;
            --bg-panel: #1f1f1f;
            --border-panel: #333;
            --accent-yellow: #fdd835; /* 버튼 등 */
            --text-white: #fff;
            --text-gray: #b0b0b0;
            
            /* 등급별 색상 (요청하신 컬러) */
            --col-SSS: #d500f9; /* 보라 */
            --col-SS: #ff6d00;  /* 주황 */
            --col-S: #d50000;   /* 빨강 */
            --col-A: #2962ff;   /* 파랑 */
            --col-B: #00c853;   /* 초록 */
            --col-C: #616161;   /* 회색 */
        }

        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-body);
            color: var(--text-white);
            font-family: 'Pretendard', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* === 상단 헤더 === */
        .header {
            height: 70px;
            background: #000;
            border-bottom: 3px solid #d32f2f;
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
        }
        .header-title {
            font-family: 'Impact', sans-serif;
            font-size: 2rem;
            color: white;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .header-right {
            display: flex;
            gap: 10px;
        }
        .top-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .top-btn.yellow {
            background: var(--accent-yellow);
            color: #000;
            font-weight: bold;
            border: none;
        }

        /* === 메인 컨테이너 === */
        .main-container {
            flex: 1;
            display: flex;
            padding: 30px;
            gap: 30px;
            justify-content: center;
            overflow-y: auto;
            background: radial-gradient(circle at 50% 50%, #2c2c2c 0%, #121212 80%);
        }

        /* === 왼쪽: 지갑 & 상점 (사이드바 대체) === */
        .wallet-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .info-box {
            background: var(--bg-panel);
            border: 1px solid var(--border-panel);
            padding: 20px;
            border-radius: 8px;
        }
        .info-title {
            font-size: 0.9rem;
            color: var(--text-gray);
            border-left: 3px solid #d32f2f;
            padding-left: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .asset-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #121212;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            border: 1px solid #333;
        }
        .shop-btn {
            width: 100%;
            background: #252525;
            border: 1px solid #444;
            color: #ccc;
            padding: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shop-btn:hover { background: #333; border-color: var(--accent-yellow); color: white; }
        .shop-btn span { font-weight: bold; }
        .fv-input {
            width: 100%; padding: 10px; background: #121212; border: 1px solid #444; 
            color: white; text-align: center; margin-bottom: 5px;
        }

        /* === 중앙: 게임 보드 (이미지 스타일) === */
        .game-frame {
            display: flex;
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 30px;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 900px;
        }

        /* 게임 왼쪽 컨트롤 (노란 버튼 있는 곳) */
        .game-controls {
            width: 240px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* 스페셜 정비 버튼 스타일 */
        .special-btn-area {
            background: #222;
            border: 1px solid #444;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
        }
        .big-yellow-btn {
            background: var(--accent-yellow);
            color: #000;
            font-weight: 900;
            font-size: 1.1rem;
            width: 100%;
            padding: 15px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 0 #f9a825;
            margin-bottom: 5px;
        }
        .big-yellow-btn:active { transform: translateY(2px); box-shadow: none; }
        .cost-info { font-size: 0.75rem; color: #888; margin-top: 5px; }

        /* 잔여 수량 테이블 (핵심 요청) */
        .remain-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-top: 10px;
        }
        .remain-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111;
            border: 1px solid #333;
            padding: 6px 10px;
            border-radius: 3px;
        }
        .tag {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 2px;
            color: white;
            width: 35px;
            text-align: center;
        }
        .count { font-size: 0.9rem; font-weight: bold; color: white; }

        /* 태그 색상 클래스 */
        .tag-SSS { background: var(--col-SSS); }
        .tag-SS { background: var(--col-SS); }
        .tag-S { background: var(--col-S); }
        .tag-A { background: var(--col-A); }
        .tag-B { background: var(--col-B); }
        .tag-C { background: var(--col-C); }

        /* 하단 버튼들 */
        .control-btns { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }
        .sub-btn {
            background: #333; color: #ccc; border: 1px solid #555; padding: 10px; cursor: pointer;
        }
        .sub-btn:hover { background: #444; color: white; }

        /* === 오른쪽: 8x5 그리드 === */
        .grid-area {
            flex: 1;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
        }
        .slot {
            aspect-ratio: 1/1;
            background: #263238; /* 닫힌 칸: 어두운 청회색 */
            border: 1px solid #37474f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #546e7a;
            cursor: pointer;
            position: relative;
        }
        .slot:hover { border-color: #78909c; background: #37474f; }
        
        /* 힌트 텍스트 */
        .hint-text {
            font-size: 0.55rem; position: absolute; bottom: 3px; width: 100%; text-align: center;
        }
        .text-hint-green { color: #69f0ae; } /* B이상 */
        .text-hint-blue { color: #40c4ff; }   /* A이상 */

        /* 힌트 상태 */
        .slot.hinted {
            border: 2px solid var(--accent-yellow);
            color: var(--accent-yellow);
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.6; } }

        /* 열린 상태 (요청하신 색상 적용) */
        .slot.opened { cursor: default; border: none; color: white; }
        .bg-SSS { background: var(--col-SSS); border: 2px solid white !important; box-shadow: 0 0 15px var(--col-SSS); z-index: 10; }
        .bg-SS  { background: var(--col-SS); }
        .bg-S   { background: var(--col-S); }
        .bg-A   { background: var(--col-A); }
        .bg-B   { background: var(--col-B); }
        .bg-C   { background: var(--col-C); color: #ccc; }

        /* 하단 로그 */
        .log-bar {
            margin-top: 15px;
            background: #111;
            padding: 10px;
            font-size: 0.8rem;
            color: #00e676;
            font-family: monospace;
            border-top: 2px solid #333;
            height: 40px;
            overflow: hidden;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">REPAIR MASTER</div>
        <div class="header-right">
            <button class="top-btn yellow">SSS 정비 마스터</button>
            <button class="top-btn">포인트 교환소</button>
        </div>
    </div>

    <div class="main-container">
        
        <div class="wallet-panel">
            <div class="info-box">
                <div class="info-title">보유 자산</div>
                <div class="asset-row">
                    <span style="color:#aaa;">FV</span>
                    <span style="color:var(--col-S); font-weight:bold;" id="fv-disp">0</span>
                </div>
                <div class="asset-row">
                    <span style="color:#aaa;">이용권</span>
                    <span style="color:var(--accent-yellow); font-weight:bold;" id="ticket-disp">0장</span>
                </div>
                <div style="margin-top:10px;">
                    <input type="number" id="fv-input" class="fv-input" placeholder="충전액 입력">
                    <button class="top-btn" style="width:100%" onclick="chargeFV()">FV 충전하기</button>
                </div>
            </div>

            <div class="info-box">
                <div class="info-title">이용권 구매 (1장=30FV)</div>
                <button class="shop-btn" onclick="buyTicket(1)"><span>1장</span> <span style="font-size:0.8rem; color:#888;">30 FV</span></button>
                <button class="shop-btn" onclick="buyTicket(10)"><span>10장</span> <span style="font-size:0.8rem; color:#888;">300 FV</span></button>
                <button class="shop-btn" onclick="buyTicket(100)"><span>100장</span> <span style="font-size:0.8rem; color:#888;">3,000 FV</span></button>
                <button class="shop-btn" onclick="buyTicket(1000)" style="border-color:var(--col-A);">
                    <span style="color:var(--col-A);">1,000장</span> <span style="font-size:0.8rem; color:#888;">30,000 FV</span>
                </button>
            </div>
        </div>

        <div class="game-frame">
            
            <div class="game-controls">
                <div class="special-btn-area">
                    <div style="color:var(--accent-yellow); font-weight:bold; margin-bottom:10px; display:flex; align-items:center; gap:5px;">
                        <span>★</span> 스페셜 정비
                    </div>
                    <button class="big-yellow-btn" onclick="autoAI()">
                        AI 자동 정비
                    </button>
                    <div class="cost-info">[1회 소모: 이용권 30장]</div>
                </div>

                <div style="background:#111; padding:10px; border:1px solid #333; border-radius:6px;">
                    <div style="font-size:0.8rem; color:#888; margin-bottom:5px; text-align:center;">잔여 보상</div>
                    <div class="remain-table">
                        <div class="remain-item"><span class="tag tag-SSS">SSS</span> <span class="count" id="cnt-SSS">1</span></div>
                        <div class="remain-item"><span class="tag tag-SS">SS</span> <span class="count" id="cnt-SS">2</span></div>
                        <div class="remain-item"><span class="tag tag-S">S</span> <span class="count" id="cnt-S">3</span></div>
                        <div class="remain-item"><span class="tag tag-A">A</span> <span class="count" id="cnt-A">10</span></div>
                        <div class="remain-item"><span class="tag tag-B">B</span> <span class="count" id="cnt-B">12</span></div>
                        <div class="remain-item"><span class="tag tag-C">C</span> <span class="count" id="cnt-C">12</span></div>
                    </div>
                </div>

                <div class="control-btns">
                    <button class="sub-btn" onclick="resetBoard()">정비 재시작 (초기화)</button>
                </div>
            </div>

            <div class="grid-area">
                <div style="display:grid; grid-template-columns:repeat(8, 1fr); text-align:center; margin-bottom:5px; color:#555; font-size:0.8rem; font-weight:bold;">
                    <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span>
                </div>
                <div class="grid-container" id="grid">
                    </div>
                <div class="log-bar" id="log-text">
                    [SYSTEM] 정비마스터 시뮬레이터 준비 완료
                </div>
            </div>

        </div>

    </div>

<script>
    // === 상태 변수 ===
    let myFV = 0;
    let myTickets = 0;
    let board = []; // {reward: 'S', opened: false, hinted: false}
    let isAutoRunning = false;
    let hintCount = 0;

    // === 초기화 및 로직 ===
    function initBoard() {
        // 1. 보상 배열 생성
        let rewards = [
            ...Array(1).fill('SSS'), ...Array(2).fill('SS'), ...Array(3).fill('S'),
            ...Array(10).fill('A'), ...Array(12).fill('B'), ...Array(12).fill('C')
        ];

        // 2. 셔플 & 유효성 검사 (C 좌우 금지)
        let attempts = 0;
        while(true) {
            attempts++;
            // Fisher-Yates Shuffle
            for (let i = rewards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rewards[i], rewards[j]] = [rewards[j], rewards[i]];
            }
            
            let valid = true;
            for(let i=0; i<40; i++) {
                if(rewards[i] === 'C') {
                    if(i % 8 > 0 && rewards[i-1] === 'C') { valid = false; break; }
                    if(i % 8 < 7 && rewards[i+1] === 'C') { valid = false; break; }
                }
            }
            if(valid) break;
            if(attempts > 2000) break; // 무한루프 방지
        }

        // 3. 보드 상태 설정
        board = rewards.map(r => ({ reward: r, opened: false, hinted: false }));
        hintCount = 0;
        
        renderBoard();
        updateRemainCounts();
        log("[SYSTEM] 보상판이 재배치되었습니다.");
    }

    // === 렌더링 ===
    function renderBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        board.forEach((slot, i) => {
            const div = document.createElement('div');
            let cls = 'slot';
            let html = '';

            if (slot.opened) {
                // 열린 상태
                cls += ` opened bg-${slot.reward}`;
                html = slot.reward;
            } else {
                // 닫힌 상태 (번호 or 힌트)
                if (slot.hinted) {
                    cls += ' hinted';
                    html = `?<div class="hint-text text-hint-blue">(A↑)</div>`;
                } else {
                    html = (i + 1);
                    
                    // C등급 인접 힌트 (열린 C 옆)
                    let showGreenHint = false;
                    if(i % 8 > 0 && board[i-1].opened && board[i-1].reward === 'C') showGreenHint = true;
                    if(i % 8 < 7 && board[i+1].opened && board[i+1].reward === 'C') showGreenHint = true;

                    if(showGreenHint) {
                        html += `<div class="hint-text text-hint-green">(B↑)</div>`;
                    }
                }
                div.onclick = () => openSlot(i);
            }

            div.className = cls;
            div.innerHTML = html;
            grid.appendChild(div);
        });
    }

    // === 잔여 수량 업데이트 (요청 기능) ===
    function updateRemainCounts() {
        const counts = { SSS:0, SS:0, S:0, A:0, B:0, C:0 };
        board.forEach(slot => {
            if(!slot.opened) counts[slot.reward]++;
        });

        for(let key in counts) {
            document.getElementById(`cnt-${key}`).innerText = counts[key];
        }
    }

    // === 슬롯 오픈 ===
    function openSlot(i) {
        if(board[i].opened) return;
        if(myTickets < 30) {
            log("[오류] 이용권이 부족합니다.");
            isAutoRunning = false;
            return;
        }

        myTickets -= 30;
        updateDisplay();
        
        board[i].opened = true;
        hintCount++;
        
        // 3회마다 힌트
        if(hintCount % 3 === 0) giveHint();

        renderBoard();
        updateRemainCounts();

        const reward = board[i].reward;
        
        if(reward === 'SSS') {
            log(`★ JACKPOT! SSS 등급 획득! ★`);
            if(isAutoRunning) {
                // AI는 자동 리셋
                setTimeout(() => {
                    initBoard();
                    if(isAutoRunning && myTickets >= 30) setTimeout(runAILoop, 300);
                }, 800);
            } else {
                log("축하합니다! 초기화 버튼을 눌러주세요.");
            }
            return 'SSS';
        } else {
            log(`${i+1}번 오픈 -> [${reward}] 획득`);
        }
        return reward;
    }

    // === AI 로직 ===
    function autoAI() {
        if(isAutoRunning) return;
        isAutoRunning = true;
        log("[AI] 자동 정비 시작...");
        runAILoop();
    }

    function runAILoop() {
        if(!isAutoRunning) return;
        if(myTickets < 30) {
            log("[AI] 이용권 부족으로 중단");
            isAutoRunning = false;
            return;
        }

        // 전략: 1. 시스템 힌트 -> 2. C 옆 -> 3. 랜덤
        let target = -1;
        const hints = board.map((s,i)=>i).filter(i => s.hinted && !s.opened);
        if(hints.length > 0) target = hints[0];

        if(target === -1) {
            // 직전 오픈이 C였는지 확인하는 로직 대신, 현재 판에서 열린 C 옆의 닫힌 칸 찾기
            const cNeighbors = [];
            board.forEach((s, i) => {
                if(s.opened && s.reward === 'C') {
                    if(i%8 > 0 && !board[i-1].opened) cNeighbors.push(i-1);
                    if(i%8 < 7 && !board[i+1].opened) cNeighbors.push(i+1);
                }
            });
            if(cNeighbors.length > 0) target = cNeighbors[Math.floor(Math.random()*cNeighbors.length)];
        }

        if(target === -1) {
            const unopened = board.map((s,i)=>i).filter(i => !s.opened);
            if(unopened.length === 0) {
                initBoard();
                setTimeout(runAILoop, 300);
                return;
            }
            target = unopened[Math.floor(Math.random()*unopened.length)];
        }

        const res = openSlot(target);
        if(res !== 'SSS') setTimeout(runAILoop, 150);
    }

    function giveHint() {
        const targets = board.map((s, i) => i).filter(i => !s.opened && ['SSS','SS','S','A'].includes(s.reward));
        if(targets.length > 0) {
            const idx = targets[Math.floor(Math.random()*targets.length)];
            board[idx].hinted = true;
            renderBoard();
        }
    }

    function resetBoard() {
        initBoard();
    }

    // === 자산 관련 ===
    function chargeFV() {
        const val = parseInt(document.getElementById('fv-input').value);
        if(val > 0) {
            myFV += val;
            document.getElementById('fv-input').value = '';
            updateDisplay();
            log(`[충전] ${val} FV 충전 완료`);
        }
    }
    function buyTicket(n) {
        const cost = n * 30;
        if(myFV >= cost) {
            myFV -= cost;
            myTickets += n;
            updateDisplay();
            log(`[구매] 이용권 ${n}장 구매 완료`);
        } else {
            log("[오류] FV가 부족합니다");
        }
    }
    function updateDisplay() {
        document.getElementById('fv-disp').innerText = myFV.toLocaleString();
        document.getElementById('ticket-disp').innerText = myTickets.toLocaleString() + '장';
    }
    function log(msg) {
        document.getElementById('log-text').innerText = msg;
    }

    // 실행
    initBoard();
</script>

</body>
</html>
