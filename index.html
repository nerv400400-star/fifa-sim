<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Reward Board Stable Version</title>
<style>
    body {
        background:#111;
        color:white;
        font-family:Arial, Helvetica, sans-serif;
        text-align:center;
    }

    h1 {
        margin-top:20px;
    }

    #board {
        width:600px;
        margin:30px auto;
        display:grid;
        grid-template-columns:repeat(8,1fr);
        gap:8px;
    }

    .cell {
        height:60px;
        display:flex;
        align-items:center;
        justify-content:center;
        border-radius:8px;
        font-weight:bold;
        font-size:16px;
        cursor:pointer;
        user-select:none;
        transition:0.2s;
    }

    .a { background:#3498db; }
    .b { background:#e67e22; }
    .c { background:#9b59b6; }
    .s { background:#2ecc71; }
    .ss { background:#e74c3c; }
    .sss { background:#f1c40f; color:black; }

    button {
        margin:20px;
        padding:10px 20px;
        font-size:16px;
        border:none;
        border-radius:6px;
        cursor:pointer;
    }
</style>
</head>
<body>

<h1>Reward Board (완전 안정 버전)</h1>
<button onclick="init()">리셋</button>

<div id="board"></div>

<script>

//////////////////////////////////////////////////////
// 기본 설정
//////////////////////////////////////////////////////

const TOTAL_CELLS = 40;

const rewardCounts = {
    sss: 1,
    ss: 2,
    s: 1,
    a: 12,
    b: 12,
    c: 12
};

//////////////////////////////////////////////////////
// 고정 위치 (필요하면 수정 가능)
//////////////////////////////////////////////////////

const fixedMap = {
    5: 'sss',
    10: 'ss',
    15: 'ss',
    20: 's'
};

//////////////////////////////////////////////////////
// 보드 배열
//////////////////////////////////////////////////////

let board = [];

//////////////////////////////////////////////////////
// 초기화
//////////////////////////////////////////////////////

function init() {
    createEmptyBoard();
    fillRandomRewards();
    applyFixedRewards();
    renderBoard();
}

//////////////////////////////////////////////////////
// 빈 보드 생성
//////////////////////////////////////////////////////

function createEmptyBoard() {
    board = [];
    for(let i=1;i<=TOTAL_CELLS;i++){
        board.push({
            pos:i,
            reward:null
        });
    }
}

//////////////////////////////////////////////////////
// 랜덤 채우기 (개수 절대 고정)
//////////////////////////////////////////////////////

function fillRandomRewards() {

    let pool = [];

    for(let key in rewardCounts){
        for(let i=0;i<rewardCounts[key];i++){
            pool.push(key);
        }
    }

    shuffle(pool);

    for(let i=0;i<TOTAL_CELLS;i++){
        board[i].reward = pool[i];
    }
}

//////////////////////////////////////////////////////
// 고정 적용 (개수 안 깨짐)
//////////////////////////////////////////////////////

function applyFixedRewards() {

    for(let pos in fixedMap){

        let index = pos - 1;
        let type = fixedMap[pos];

        if(board[index].reward === type) continue;

        let swapIndex = findSwappableIndex(type);

        if(swapIndex !== -1){
            board[swapIndex].reward = board[index].reward;
        }

        board[index].reward = type;
    }
}

//////////////////////////////////////////////////////
// 교환 가능한 인덱스 찾기
//////////////////////////////////////////////////////

function findSwappableIndex(type){

    for(let i=0;i<TOTAL_CELLS;i++){

        let pos = i + 1;

        if(fixedMap[pos]) continue;

        if(board[i].reward === type){
            return i;
        }
    }

    return -1;
}

//////////////////////////////////////////////////////
// 셔플
//////////////////////////////////////////////////////

function shuffle(array) {
    for(let i=array.length-1;i>0;i--){
        let j = Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

//////////////////////////////////////////////////////
// 출력
//////////////////////////////////////////////////////

function renderBoard(){

    const container = document.getElementById("board");
    container.innerHTML = "";

    board.forEach(cell => {

        let div = document.createElement("div");
        div.className = "cell " + cell.reward;
        div.innerText = cell.reward + " (" + cell.pos + ")";

        container.appendChild(div);
    });
}

//////////////////////////////////////////////////////
// 시작
//////////////////////////////////////////////////////

init();

</script>
</body>
</html>
