<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Reward Board Stable Version</title>
<style>
    body {
        background:#111;
        color:white;
        font-family:Arial, Helvetica, sans-serif;
        text-align:center;
    }

    h1 {
        margin-top:20px;
    }

    #board {
        width:600px;
        margin:30px auto;
        display:grid;
        grid-template-columns:repeat(8,1fr);
        gap:8px;
    }

    .cell {
        height:60px;
        display:flex;
        align-items:center;
        justify-content:center;
        border-radius:8px;
        font-weight:bold;
        font-size:18px;
        cursor:pointer;
        user-select:none;
        transition:0.2s;
    }

    .A { background:#3498db; }
    .B { background:#e67e22; }
    .C { background:#9b59b6; }
    .SS { background:#e74c3c; }

    button {
        margin:20px;
        padding:10px 20px;
        font-size:16px;
        border:none;
        border-radius:6px;
        cursor:pointer;
    }
</style>
</head>
<body>

<h1>Reward Board (완전 안정 버전)</h1>
<button onclick="init()">리셋</button>

<div id="board"></div>

<script>

//////////////////////////////////////////////////////
// 기본 설정
//////////////////////////////////////////////////////

const TOTAL_CELLS = 40;

const rewardCounts = {
    A: 15,
    B: 10,
    C: 14,
    SS: 1
};

//////////////////////////////////////////////////////
// 고정 위치 정의
//////////////////////////////////////////////////////

const fixedMap = {
    2: 'B',
    7: 'B',
    22: 'B',
    24: 'B',
    26: 'B',

    4: 'A',
    6: 'A',
    12: 'A',
    14: 'A',
    17: 'A',
    18: 'A',
    20: 'A',
    36: 'A',
    38: 'A',

    10: 'SS',
    5: 'C'
};

//////////////////////////////////////////////////////
// 보드 배열
//////////////////////////////////////////////////////

let board = [];

//////////////////////////////////////////////////////
// 초기화
//////////////////////////////////////////////////////

function init() {
    createEmptyBoard();
    fillRandomRewards();
    applyFixedRewards();
    renderBoard();
}

//////////////////////////////////////////////////////
// 빈 보드 생성
//////////////////////////////////////////////////////

function createEmptyBoard() {
    board = [];
    for(let i=1;i<=TOTAL_CELLS;i++){
        board.push({
            pos:i,
            reward:null
        });
    }
}

//////////////////////////////////////////////////////
// 랜덤 채우기
//////////////////////////////////////////////////////

function fillRandomRewards() {

    let pool = [];

    for(let key in rewardCounts){
        for(let i=0;i<rewardCounts[key];i++){
            pool.push(key);
        }
    }

    shuffle(pool);

    for(let i=0;i<TOTAL_CELLS;i++){
        board[i].reward = pool[i];
    }
}

//////////////////////////////////////////////////////
// 고정 적용 (절대 안 깨짐 방식)
//////////////////////////////////////////////////////

function applyFixedRewards() {

    // 1. 고정 자리에 먼저 강제 삽입
    for(let pos in fixedMap){

        let index = pos - 1;
        let type = fixedMap[pos];

        // 이미 맞으면 패스
        if(board[index].reward === type) continue;

        // 해당 타입 다른 위치 찾기
        let swapIndex = findSwappableIndex(type);

        if(swapIndex !== -1){
            board[swapIndex].reward = board[index].reward;
        }

        board[index].reward = type;
    }
}

//////////////////////////////////////////////////////
// 고정 자리 제외하고 교환 가능 인덱스 찾기
//////////////////////////////////////////////////////

function findSwappableIndex(type){

    for(let i=0;i<TOTAL_CELLS;i++){

        let pos = i + 1;

        // 고정 자리면 건너뜀
        if(fixedMap[pos]) continue;

        if(board[i].reward === type){
            return i;
        }
    }

    return -1;
}

//////////////////////////////////////////////////////
// 셔플 함수
//////////////////////////////////////////////////////

function shuffle(array) {
    for(let i=array.length-1;i>0;i--){
        let j = Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

//////////////////////////////////////////////////////
// 화면 출력
//////////////////////////////////////////////////////

function renderBoard(){

    const container = document.getElementById("board");
    container.innerHTML = "";

    board.forEach(cell => {

        let div = document.createElement("div");
        div.className = "cell " + cell.reward;
        div.innerText = cell.reward + " (" + cell.pos + ")";

        container.appendChild(div);
    });
}

//////////////////////////////////////////////////////
// 시작
//////////////////////////////////////////////////////

init();

</script>
</body>
</html>
