<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPAIR MASTER - SILENT EDITION</title>
    <style>
        /* === 전체 테마 설정 === */
        :root {
            --bg-dark: #0a0a0c;
            --accent-red: #e50914;
            --accent-gold: #ffd700;
            --text-main: #ffffff;
            --panel-bg: #141414;
            --border-color: #333;
        }
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* === 헤더 === */
        .header {
            padding: 20px 40px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(20,20,20,0.8) 100%);
            border-bottom: 2px solid var(--accent-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.3);
            z-index: 10;
        }
        .header-logo {
            font-family: 'Impact', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-red);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .badge {
            background: var(--accent-red);
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 4px;
            vertical-align: middle;
        }

        /* === 메인 레이아웃 === */
        .container {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 30px 40px;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        /* === 왼쪽 컨트롤 패널 === */
        .left-panel {
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .section-title {
            font-size: 1rem;
            font-weight: bold;
            color: #aaa;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--accent-red);
            padding-left: 10px;
        }

        /* 자산 디스플레이 */
        .asset-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #333;
        }
        .asset-label { font-size: 0.9rem; color: #888; }
        .asset-value { font-size: 1.4rem; font-weight: bold; color: #fff; }
        .asset-unit { font-size: 0.9rem; margin-left: 5px; }
        
        .fv-text { color: var(--accent-red); }
        .ticket-text { color: var(--accent-gold); }

        .input-group { display: flex; gap: 5px; margin-top: 10px; }
        input {
            flex: 1; background: #222; border: 1px solid #444; color: white; 
            padding: 10px; text-align: center; border-radius: 4px; font-weight: bold;
        }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 4px; transition: 0.2s; color: white; }
        
        .btn-charge { background: #444; padding: 0 15px; }
        .btn-charge:hover { background: #666; }

        /* 티켓 교환소 버튼 */
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .btn-buy {
            background: #222;
            border: 1px solid #444;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .btn-buy:hover { background: #333; border-color: var(--accent-gold); }
        .btn-buy:active { transform: scale(0.95); }
        .buy-amount { font-size: 1.1rem; color: var(--accent-gold); }
        .buy-price { font-size: 0.8rem; color: #888; }

        .btn-main {
            width: 100%; padding: 15px; font-size: 1.1rem; margin-top: 10px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.5);
        }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }
        .btn-ai { background: linear-gradient(45deg, #1e88e5, #1565c0); }
        .btn-reset { background: linear-gradient(45deg, #d32f2f, #c62828); }

        /* === 오른쪽 게임 영역 === */
        .game-area {
            flex: 1;
            max-width: 800px;
        }

        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }
        .cost-badge {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            background: #111;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #333;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .slot {
            aspect-ratio: 1/1;
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #444;
            cursor: pointer;
            position: relative;
        }
        .slot:hover { border-color: #888; background: #333; }
        .slot:active { transform: scale(0.95); }

        /* 힌트 및 오픈 효과 */
        .slot.hinted {
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

        .slot.opened { cursor: default; border: none; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        /* 등급별 색상 */
        .bg-SSS { background: linear-gradient(135deg, #ffd700, #ffb300); color: #000; border: 2px solid #fff; box-shadow: 0 0 20px #ffd700; z-index: 10; font-size: 1.5rem; }
        .bg-SS  { background: linear-gradient(135deg, #ff9100, #ff6d00); color: #fff; }
        .bg-S   { background: #ff5252; color: #fff; }
        .bg-A   { background: #448aff; color: #fff; }
        .bg-B   { background: #69f0ae; color: #000; }
        .bg-C   { background: #424242; color: #aaa; }

        /* 로그창 */
        .log-box {
            margin-top: 15px;
            background: #000;
            border: 1px solid #333;
            height: 120px;
            padding: 10px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #00e676;
            line-height: 1.5;
        }
        .log-time { color: #555; margin-right: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-logo">
            REPAIR MASTER <span class="badge">SILENT</span>
        </div>
        <div style="font-size:0.9rem; color:#888;">팝업 없는 쾌적한 뽑기</div>
    </div>

    <div class="container">
        
        <div class="left-panel">
            
            <div class="card">
                <div class="section-title">내 자산 (Wallet)</div>
                
                <div class="asset-row">
                    <span class="asset-label">보유 FV</span>
                    <div>
                        <span class="asset-value fv-text" id="fv-display">0</span>
                        <span class="asset-unit fv-text">FV</span>
                    </div>
                </div>
                <div class="input-group">
                    <input type="number" id="fv-input" placeholder="FV 충전">
                    <button class="btn-charge" onclick="chargeFV()">충전</button>
                </div>

                <div class="asset-row" style="margin-top:15px; border-color:var(--accent-gold);">
                    <span class="asset-label" style="color:var(--accent-gold);">교환권</span>
                    <div>
                        <span class="asset-value ticket-text" id="ticket-display">0</span>
                        <span class="asset-unit ticket-text">장</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">
                    <span>티켓 교환소 (No Popup)</span>
                </div>
                <div class="shop-grid">
                    <button class="btn-buy" onclick="buyTicket(1)">
                        <span class="buy-amount">1장</span>
                        <span class="buy-price">30 FV</span>
                    </button>
                    <button class="btn-buy" onclick="buyTicket(10)">
                        <span class="buy-amount">10장</span>
                        <span class="buy-price">300 FV</span>
                    </button>
                    <button class="btn-buy" onclick="buyTicket(100)">
                        <span class="buy-amount">100장</span>
                        <span class="buy-price">3,000 FV</span>
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="section-title">제어판 (Control)</div>
                <button class="btn-main btn-ai" onclick="autoAI()">AI 자동 전략 (START)</button>
                <button class="btn-main btn-reset" onclick="resetBoard()">보상판 초기화</button>
            </div>
        </div>

        <div class="game-area">
            <div class="card" style="height: 100%;">
                <div class="grid-header">
                    <h2 style="margin:0; color:#fff;">정비 구역</h2>
                    <div class="cost-badge">1회 소모: 교환권 30장</div>
                </div>

                <div class="grid-container" id="grid">
                    </div>

                <div class="log-box" id="log">
                    <div>[SYSTEM] 시뮬레이터 준비 완료.</div>
                    <div>[INFO] 모든 팝업 알림이 제거되었습니다.</div>
                </div>
            </div>
        </div>

    </div>

<script>
    // === 전역 변수 ===
    let myFV = 0;
    let myTickets = 0;
    
    // 게임 데이터
    let board = [];
    let openedCount = 0;
    let hintCount = 0;
    let lastReward = null;
    let lastIdx = -1;
    let isAutoRunning = false;
    
    // === 자산 관리 (알림 없음) ===
    function chargeFV() {
        const input = document.getElementById('fv-input');
        const val = parseInt(input.value);
        if(!val || val < 0) return;
        
        myFV += val;
        input.value = '';
        updateDisplay();
        log(`[충전] ${val.toLocaleString()} FV 충전.`);
    }

    function buyTicket(amount) {
        const cost = amount * 30;
        if(myFV < cost) {
            log("[구매실패] FV가 부족합니다.");
            return;
        }
        
        // 확인창(confirm) 없이 즉시 구매
        myFV -= cost;
        myTickets += amount;
        updateDisplay();
        log(`[구매] 티켓 ${amount}장 구매 완료. (-${cost} FV)`);
    }

    // === 보드 생성 (엄격한 C 규칙) ===
    function initBoard() {
        let rewards = [
            ...Array(1).fill('SSS'), ...Array(2).fill('SS'), ...Array(3).fill('S'),
            ...Array(10).fill('A'), ...Array(12).fill('B'), ...Array(12).fill('C')
        ];

        let attempts = 0;
        while(true) {
            attempts++;
            for (let i = rewards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rewards[i], rewards[j]] = [rewards[j], rewards[i]];
            }

            let valid = true;
            for(let i=0; i<40; i++) {
                if(rewards[i] === 'C') {
                    const row = Math.floor(i / 8);
                    if(i % 8 > 0 && rewards[i-1] === 'C') { valid = false; break; }
                    if(i % 8 < 7 && rewards[i+1] === 'C') { valid = false; break; }
                }
            }
            if(valid) break;
            if(attempts > 1000) { attempts=0; }
        }

        board = rewards.map(r => ({reward: r, opened: false, hinted: false}));
        hintCount = 0; lastReward = null; lastIdx = -1; openedCount = 0;
        
        // AI 실행 중이 아니면 멈춤 상태
        if(!isAutoRunning) {
            // 수동 초기화 시 로직 없음
        }
        
        renderBoard();
        log("[SYSTEM] 보상판 재배치 완료.");
    }

    // === 렌더링 ===
    function renderBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        
        board.forEach((slot, i) => {
            const div = document.createElement('div');
            let cls = 'slot';
            if(slot.opened) cls += ' opened bg-' + slot.reward;
            else if(slot.hinted) cls += ' hinted';
            
            div.className = cls;
            div.innerText = slot.opened ? slot.reward : (slot.hinted ? '?' : i + 1);
            
            if(!slot.opened) {
                div.onclick = () => openSlot(i);
            }
            grid.appendChild(div);
        });
    }

    // === 슬롯 오픈 ===
    function openSlot(i) {
        if(board[i].opened) return;
        
        if(myTickets < 30) {
            log("[오류] 티켓 부족. (1회 30장 필요)");
            isAutoRunning = false;
            return;
        }

        myTickets -= 30;
        hintCount++;
        openedCount++;

        const reward = board[i].reward;
        board[i].opened = true;
        lastReward = reward;
        lastIdx = i;

        if(hintCount % 3 === 0) giveHint();

        // SSS 획득 시 처리 로직 분기
        if(reward === 'SSS') {
            renderBoard();
            updateDisplay();
            log(`[JACKPOT] ★★★ SSS 등급 획득! ★★★`);

            if(isAutoRunning) {
                // AI 모드: 자동 리셋 후 계속 진행
                log("[AI] SSS 획득으로 인해 판을 초기화합니다.");
                setTimeout(() => {
                    initBoard();
                    // 티켓 있으면 계속 진행 (재귀 호출 방지 위해 타이머)
                    if(isAutoRunning && myTickets >= 30) {
                        setTimeout(runAILoop, 300);
                    }
                }, 800); // 0.8초 감상 시간 제공
            } else {
                // 수동 모드: 아무것도 안 함 (유저가 리셋 버튼 누를 때까지 대기)
                log("[대기] 수동 모드입니다. 초기화하려면 버튼을 누르세요.");
            }
            return 'SSS';
        }

        log(`[OPEN] ${i+1}번 -> [${reward}] (남은티켓: ${myTickets})`);
        renderBoard();
        updateDisplay();
        return reward;
    }

    // === 힌트 로직 ===
    function giveHint() {
        const targets = board.map((s, i) => i)
            .filter(i => !board[i].opened && ['SSS','SS','S','A'].includes(board[i].reward));
        
        if(targets.length > 0) {
            const idx = targets[Math.floor(Math.random()*targets.length)];
            board[idx].hinted = true;
            renderBoard();
            log(`[HINT] 시스템이 ${idx+1}번 위치를 식별했습니다.`);
        }
    }

    // === AI 자동 전략 ===
    function autoAI() {
        if(isAutoRunning) {
            // 이미 돌고 있다면 끄기 기능? (여기선 일단 켜기만)
            return;
        }
        isAutoRunning = true;
        log("[AI] 자동 전략 가동 시작.");
        runAILoop();
    }

    function runAILoop() {
        if(!isAutoRunning) return;
        if(myTickets < 30) {
            log("[AI] 티켓 소진으로 중지.");
            isAutoRunning = false;
            return;
        }

        let targetIdx = -1;
        
        // 1. 힌트 우선
        const hints = board.map((s,i)=>i).filter(i => board[i].hinted && !board[i].opened);
        if(hints.length > 0) targetIdx = hints[0];
        
        // 2. C등급 옆 공략
        else if(lastReward === 'C') {
            const row = Math.floor(lastIdx/8);
            const candidates = [lastIdx-1, lastIdx+1].filter(i => 
                i >= 0 && i < 40 && Math.floor(i/8) === row && !board[i].opened
            );
            if(candidates.length > 0) targetIdx = candidates[Math.floor(Math.random()*candidates.length)];
        }
        
        // 3. 랜덤
        if(targetIdx === -1) {
            const unopened = board.map((s,i)=>i).filter(i => !board[i].opened);
            if(unopened.length === 0) {
                // 다 열었으면 초기화
                initBoard();
                setTimeout(runAILoop, 300);
                return;
            }
            targetIdx = unopened[Math.floor(Math.random()*unopened.length)];
        }

        const res = openSlot(targetIdx);
        
        // SSS가 나오면 openSlot 내부에서 처리함 (AI 리셋 로직)
        // SSS가 아닐 때만 여기서 루프 돌림
        if(res !== 'SSS') {
            setTimeout(runAILoop, 150); // 속도: 0.15초
        }
    }

    function resetBoard() {
        // 수동 리셋은 confirm 없이 바로? 아니면 실수를 방지하기 위해?
        // "안내문구 안 나오게 해줘" 요청이 있었으므로 confirm도 제거
        initBoard();
        log("[리셋] 사용자가 판을 초기화했습니다.");
    }

    function updateDisplay() {
        document.getElementById('fv-display').innerText = myFV.toLocaleString();
        document.getElementById('ticket-display').innerText = myTickets.toLocaleString();
    }

    function log(msg) {
        const box = document.getElementById('log');
        const time = new Date().toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
        box.innerHTML += `<div><span class="log-time">[${time}]</span>${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    // 초기화 실행
    initBoard();
</script>

</body>
</html>
