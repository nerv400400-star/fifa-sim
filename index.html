<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomy Body Site</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 배경색을 흰색으로 설정 */
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .body-image-container {
            /* 신체 이미지가 가운데 오도록 컨테이너 크기 조정 */
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 80%; /* 화면 너비의 최대 80% */
            max-height: 80vh; /* 화면 높이의 최대 80% */
        }

        .body-image {
            /* 이미지 원본 비율 유지하면서 컨테이너 안에 꽉 차게 */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* 테두리나 그림자가 필요하다면 여기에 추가 (예: box-shadow: 0 4px 8px rgba(0,0,0,0.1);) */
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="body-image-container">
            <img src="image_0.png" alt="Anatomy Body Model" class="body-image">
        </div>
    </div>

</body>
</html>
