<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Reward Board Final Stable</title>
<style>
    body {
        background:#111;
        color:white;
        font-family:Arial, Helvetica, sans-serif;
        text-align:center;
    }

    h1 {
        margin-top:20px;
    }

    #board {
        width:600px;
        margin:30px auto;
        display:grid;
        grid-template-columns:repeat(8,1fr);
        gap:8px;
    }

    .cell {
        height:60px;
        display:flex;
        align-items:center;
        justify-content:center;
        border-radius:8px;
        font-weight:bold;
        font-size:16px;
        user-select:none;
    }

    .A { background:#3498db; }
    .B { background:#e67e22; }
    .C { background:#9b59b6; }
    .s { background:#2ecc71; }
    .ss { background:#e74c3c; }
    .sss { background:#f1c40f; color:black; }

    button {
        margin:20px;
        padding:10px 20px;
        font-size:16px;
        border:none;
        border-radius:6px;
        cursor:pointer;
    }
</style>
</head>
<body>

<h1>Reward Board (완전 고정 + 개수 유지)</h1>
<button onclick="init()">리셋</button>

<div id="board"></div>

<script>

const TOTAL_CELLS = 40;

// 최종 개수
const rewardCounts = {
    sss: 1,
    ss: 2,
    s: 1,
    A: 12,
    B: 12,
    C: 12
};

// 고정 위치
const fixedMap = {
    2: 'B',
    7: 'B',
    22: 'B',
    24: 'B',
    26: 'B',

    4: 'A',
    6: 'A',
    12: 'A',
    14: 'A',
    17: 'A',
    18: 'A',
    20: 'A',
    36: 'A',
    38: 'A',

    10: 'ss',
    5: 'C'
};

let board = [];

function init(){
    createBoard();
    renderBoard();
}

function createBoard(){

    board = new Array(TOTAL_CELLS).fill(null);

    let countsLeft = {...rewardCounts};

    // 1️⃣ 고정 먼저 배치
    for(let pos in fixedMap){
        let type = fixedMap[pos];
        board[pos-1] = type;
        countsLeft[type]--;
    }

    // 2️⃣ 남은 보상 풀 만들기
    let pool = [];
    for(let key in countsLeft){
        for(let i=0;i<countsLeft[key];i++){
            pool.push(key);
        }
    }

    shuffle(pool);

    // 3️⃣ 빈 칸 채우기
    let poolIndex = 0;
    for(let i=0;i<TOTAL_CELLS;i++){
        if(board[i] === null){
            board[i] = pool[poolIndex++];
        }
    }
}

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function renderBoard(){
    const container = document.getElementById("board");
    container.innerHTML="";

    board.forEach((reward,index)=>{
        let div=document.createElement("div");
        div.className="cell "+reward;
        div.innerText=reward+" ("+(index+1)+")";
        container.appendChild(div);
    });
}

init();

</script>
</body>
</html>
