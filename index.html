<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPAIR MASTER - STABLE V2.1</title>
    <style>
        /* === 전체 테마 === */
        :root {
            --bg-body: #050505;
            --bg-panel: #161616;
            --border-panel: #333;
            --accent-yellow: #ffca28; 
            --accent-red: #d32f2f;
            --text-white: #fff;
            
            /* 등급 색상 */
            --col-SSS: #e040fb; /* 보라 */
            --col-SS: #ff6d00;  /* 주황 */
            --col-S: #ff1744;   /* 빨강 */
            --col-A: #2979ff;   /* 파랑 */
            --col-B: #00e676;   /* 초록 */
            --col-C: #616161;   /* 회색 */
        }

        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-body);
            color: var(--text-white);
            font-family: 'Pretendard', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* === 헤더 === */
        .header {
            height: 80px;
            background: #000;
            border-bottom: 4px solid var(--accent-red);
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            z-index: 100;
        }
        .header-title {
            font-family: 'Impact', sans-serif;
            font-size: 2.5rem;
            color: white;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 3px 3px 0 #d32f2f;
        }
        .header-badge {
            background: #333; padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 0.9rem; border: 1px solid #555;
        }

        /* === 메인 컨테이너 === */
        .main-container {
            flex: 1;
            display: flex;
            padding: 30px;
            gap: 25px;
            justify-content: center;
            overflow-y: auto;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
        }

        /* === 패널 공통 === */
        .panel {
            background: var(--bg-panel);
            border: 2px solid var(--border-panel);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .panel-header {
            font-size: 1.1rem; font-weight: bold; color: #ccc;
            border-left: 5px solid var(--accent-red); padding-left: 15px; margin-bottom: 5px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* [좌측] 자산 & 상점 */
        .left-col { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; }
        
        .asset-box {
            background: #000; border: 2px solid #333; border-radius: 8px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .asset-val { font-size: 1.5rem; font-weight: 900; color: white; }
        .asset-label { font-size: 0.9rem; color: #888; font-weight: bold; }

        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .shop-btn {
            background: #222; border: 2px solid #444; color: #fff; padding: 15px 10px;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            cursor: pointer; border-radius: 6px; transition: 0.1s;
        }
        .shop-btn:hover { background: #333; border-color: var(--accent-yellow); color: var(--accent-yellow); }
        .shop-btn:active { transform: scale(0.96); }
        .shop-amt { font-size: 1.2rem; font-weight: 900; }
        .shop-price { font-size: 0.8rem; color: #888; }

        .input-dark {
            width: 100%; background: #000; border: 2px solid #444; color: white;
            padding: 12px; font-size: 1rem; text-align: center; font-weight: bold; border-radius: 6px;
        }
        .btn-act {
            width: 100%; background: #444; color: white; border: none; padding: 12px;
            font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 5px;
        }
        .btn-act:hover { background: #666; }

        /* [중앙] 게임 보드 */
        .center-col { flex: 1; max-width: 900px; min-width: 750px; display: flex; flex-direction: column; gap: 20px; }
        
        /* 힌트 게이지 */
        .hint-dashboard {
            display: flex; align-items: center; justify-content: space-between;
            background: #000; border: 2px solid #444; border-radius: 10px; padding: 15px 25px;
        }
        .hint-label { font-size: 1.2rem; font-weight: bold; color: #40c4ff; display: flex; align-items: center; gap: 10px; }
        
        /* 게이지 바 */
        .gauge-track {
            flex: 1; height: 20px; background: #222; border-radius: 10px; margin: 0 20px;
            display: flex; overflow: hidden; border: 1px solid #444;
        }
        .gauge-segment { flex: 1; border-right: 2px solid #000; background: #333; transition: 0.3s; }
        .gauge-segment:last-child { border-right: none; }
        .gauge-segment.active { background: #40c4ff; box-shadow: 0 0 15px #40c4ff; }
        
        .hint-status-text { font-size: 0.9rem; color: #888; font-weight: bold; width: 100px; text-align: right; }

        /* 그리드 영역 */
        .game-frame {
            flex: 1; display: flex; gap: 20px;
            background: #1a1a1a; border: 2px solid #444; border-radius: 12px; padding: 25px;
        }
        
        .grid-wrapper { flex: 1; }
        .grid-container {
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px;
        }
        .slot {
            aspect-ratio: 1/1;
            background: #252525; border: 2px solid #3c3c3c; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; position: relative; transition: 0.1s;
            font-family: 'Impact', sans-serif; font-size: 2rem; color: #555; letter-spacing: 1px;
        }
        .slot:hover { background: #333; border-color: #777; color: #888; }
        .slot:active { transform: scale(0.95); }

        /* 힌트 및 오픈 상태 */
        .slot.hinted {
            border: 3px solid #40c4ff; color: #40c4ff;
            background: rgba(64, 196, 255, 0.1);
            animation: pulseBlue 1s infinite alternate;
        }
        .slot.opened { cursor: default; border: none; color: white; font-family: 'Pretendard', sans-serif; font-weight: 900; }
        
        .hint-tag {
            position: absolute; bottom: 5px; width: 100%; text-align: center;
            font-size: 0.7rem; font-family: 'Pretendard', sans-serif; letter-spacing: -0.5px;
        }
        .text-green { color: #00e676; text-shadow: 0 0 3px black; }
        .text-blue { color: #40c4ff; text-shadow: 0 0 3px black; }

        @keyframes pulseBlue { from { box-shadow: 0 0 5px #40c4ff; } to { box-shadow: 0 0 15px #40c4ff; } }

        /* 등급 스타일 */
        .bg-SSS { background: var(--col-SSS); font-size: 2.2rem; border: 3px solid white !important; box-shadow: 0 0 25px var(--col-SSS); z-index: 10; transform: scale(1.05); }
        .bg-SS  { background: var(--col-SS); font-size: 1.8rem; }
        .bg-S   { background: var(--col-S); font-size: 1.8rem; }
        .bg-A   { background: var(--col-A); font-size: 1.8rem; }
        .bg-B   { background: var(--col-B); color: #000; font-size: 1.8rem; }
        .bg-C   { background: var(--col-C); color: #aaa; font-size: 1.6rem; }

        /* 우측 컨트롤 및 잔여수량 */
        .side-controls { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        
        .remain-box { background: #000; border: 1px solid #444; padding: 15px; border-radius: 8px; }
        .remain-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .remain-row:last-child { margin-bottom: 0; border: none; }
        .tag { padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; min-width: 40px; text-align: center; color: white; }
        
        .tag-SSS { background: var(--col-SSS); }
        .tag-SS { background: var(--col-SS); }
        .tag-S { background: var(--col-S); }
        .tag-A { background: var(--col-A); }
        .tag-B { background: var(--col-B); color:black; }
        .tag-C { background: var(--col-C); }

        .btn-ai {
            width: 100%; background: #333; color: #888; font-weight: 900; font-size: 1.2rem;
            padding: 20px 0; border: 2px solid #555; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-ai.running {
            background: var(--accent-yellow); color: black; border-color: var(--accent-yellow);
            box-shadow: 0 0 15px rgba(255, 202, 40, 0.5); animation: pulseBtn 1.5s infinite;
        }
        @keyframes pulseBtn { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        .btn-reset {
            width: 100%; background: #333; color: white; padding: 15px; font-weight: bold;
            border: 1px solid #555; border-radius: 8px; cursor: pointer; margin-top: auto;
        }
        .btn-reset:hover { background: #444; }

        /* [우측] 획득 기록 */
        .right-col { width: 250px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
        .history-item {
            background: #121212; padding: 12px; border-radius: 6px; border: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
        }
        .hist-val { font-size: 1.2rem; font-weight: bold; color: white; }

        /* 하단 로그 */
        .log-area {
            background: #111; padding: 10px 20px; font-family: monospace; font-size: 0.9rem; color: #00e676;
            border-top: 2px solid #333; white-space: nowrap; overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">REPAIR MASTER</div>
        <div class="header-badge">SIMULATOR V2.1</div>
    </div>

    <div class="main-container">
        
        <div class="left-col">
            <div class="panel">
                <div class="panel-header">내 자산 (WALLET)</div>
                <div class="asset-box">
                    <span class="asset-label">FV 포인트</span>
                    <span class="asset-val" style="color:var(--col-S);" id="fv-disp">0</span>
                </div>
                <div class="asset-box" style="border-color:var(--accent-yellow);">
                    <span class="asset-label" style="color:var(--accent-yellow);">이용권</span>
                    <span class="asset-val" style="color:var(--accent-yellow);" id="ticket-disp">0</span>
                </div>
                <div>
                    <input type="number" id="fv-input" class="input-dark" placeholder="충전할 금액 입력">
                    <button class="btn-act" onclick="chargeFV()">충전하기</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">티켓 교환소</div>
                <div class="shop-grid">
                    <div class="shop-btn" onclick="buyTicket(1)">
                        <span class="shop-amt">1장</span><span class="shop-price">30 FV</span>
                    </div>
                    <div class="shop-btn" onclick="buyTicket(10)">
                        <span class="shop-amt">10장</span><span class="shop-price">300 FV</span>
                    </div>
                    <div class="shop-btn" onclick="buyTicket(100)">
                        <span class="shop-amt">100장</span><span class="shop-price">3,000 FV</span>
                    </div>
                    <div class="shop-btn" style="border-color:var(--col-A);" onclick="buyTicket(1000)">
                        <span class="shop-amt" style="color:var(--col-A);">1,000장</span><span class="shop-price">30,000 FV</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="center-col">
            
            <div class="hint-dashboard">
                <div class="hint-label">
                    <span style="font-size:1.5rem;">⚡</span> HINT GAUGE
                </div>
                <div class="gauge-track">
                    <div class="gauge-segment" id="seg-1"></div>
                    <div class="gauge-segment" id="seg-2"></div>
                    <div class="gauge-segment" id="seg-3"></div>
                </div>
                <div class="hint-status-text" id="hint-status">0 / 3</div>
            </div>

            <div class="game-frame">
                <div class="side-controls">
                    <div class="remain-box">
                        <div style="text-align:center; color:#888; margin-bottom:10px; font-size:0.9rem;">남은 보상 수량</div>
                        <div class="remain-row"><span class="tag tag-SSS">SSS</span> <span id="cnt-SSS">1</span></div>
                        <div class="remain-row"><span class="tag tag-SS">SS</span> <span id="cnt-SS">2</span></div>
                        <div class="remain-row"><span class="tag tag-S">S</span> <span id="cnt-S">3</span></div>
                        <div class="remain-row"><span class="tag tag-A">A</span> <span id="cnt-A">10</span></div>
                        <div class="remain-row"><span class="tag tag-B">B</span> <span id="cnt-B">12</span></div>
                        <div class="remain-row"><span class="tag tag-C">C</span> <span id="cnt-C">12</span></div>
                    </div>
                    
                    <div>
                        <button class="btn-ai" id="btn-ai" onclick="toggleAI()">AI 자동 정비<br><span style="font-size:0.8rem;">[OFF]</span></button>
                        <div style="text-align:center; font-size:0.8rem; color:#666; margin-top:5px;">1회 소모: 이용권 30장</div>
                    </div>
                    
                    <button class="btn-reset" onclick="resetBoard()">판 초기화 (RESET)</button>
                </div>

                <div class="grid-wrapper">
                    <div class="grid-container" id="grid">
                        </div>
                </div>
            </div>

            <div class="log-area" id="log-text">
                [SYSTEM] REPAIR MASTER READY.
            </div>
        </div>

        <div class="right-col">
            <div class="panel" style="height:100%;">
                <div class="panel-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>획득 기록</span>
                    <span style="font-size:0.7rem; cursor:pointer; text-decoration:underline;" onclick="resetTotal()">초기화</span>
                </div>
                <div style="flex:1;">
                    <div class="history-item" style="border-color:var(--col-SSS);">
                        <span class="tag tag-SSS">SSS</span> <span class="hist-val" id="total-SSS" style="color:var(--col-SSS);">0</span>
                    </div>
                    <div class="history-item" style="border-color:var(--col-SS);">
                        <span class="tag tag-SS">SS</span> <span class="hist-val" id="total-SS" style="color:var(--col-SS);">0</span>
                    </div>
                    <div class="history-item" style="border-color:var(--col-S);">
                        <span class="tag tag-S">S</span> <span class="hist-val" id="total-S" style="color:var(--col-S);">0</span>
                    </div>
                    <div class="history-item" style="border-color:var(--col-A);">
                        <span class="tag tag-A">A</span> <span class="hist-val" id="total-A" style="color:var(--col-A);">0</span>
                    </div>
                    <div class="history-item" style="border-color:var(--col-B);">
                        <span class="tag tag-B">B</span> <span class="hist-val" id="total-B" style="color:var(--col-B);">0</span>
                    </div>
                    <div class="history-item" style="border-color:var(--col-C);">
                        <span class="tag tag-C">C</span> <span class="hist-val" id="total-C">0</span>
                    </div>
                </div>
                <div style="background:#000; padding:10px; border-radius:6px; border:1px solid #333;">
                    <div style="font-size:0.8rem; color:#888;">총 시도 횟수</div>
                    <div style="font-size:1.5rem; font-weight:bold; text-align:right;" id="total-open-count">0</div>
                </div>
            </div>
        </div>

    </div>

<script>
    // === Variables ===
    let myFV = 0;
    let myTickets = 0;
    let board = [];
    let isAutoRunning = false;
    let hintCount = 0; // 0 ~ 3
    
    // Total Stats
    let totalStats = { SSS:0, SS:0, S:0, A:0, B:0, C:0 };
    let totalOpens = 0;

    // === Initialization ===
    function initBoard() {
        let rewards = [
            ...Array(1).fill('SSS'), ...Array(2).fill('SS'), ...Array(3).fill('S'),
            ...Array(10).fill('A'), ...Array(12).fill('B'), ...Array(12).fill('C')
        ];

        // Shuffle & Validate (No C-C neighbor)
        let attempts = 0;
        while(true) {
            attempts++;
            for (let i = rewards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rewards[i], rewards[j]] = [rewards[j], rewards[i]];
            }
            let valid = true;
            for(let i=0; i<40; i++) {
                if(rewards[i] === 'C') {
                    if(i % 8 > 0 && rewards[i-1] === 'C') { valid = false; break; }
                    if(i % 8 < 7 && rewards[i+1] === 'C') { valid = false; break; }
                }
            }
            if(valid) break;
            if(attempts > 3000) break; 
        }

        board = rewards.map(r => ({ reward: r, opened: false, hinted: false }));
        hintCount = 0;
        
        updateHintGauge(); 
        renderBoard();
        updateRemainCounts();
        log("[SYSTEM] 새로운 판이 배치되었습니다.");
    }

    // === Visual Rendering ===
    function renderBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        board.forEach((slot, i) => {
            const div = document.createElement('div');
            let cls = 'slot';
            let html = '';

            if (slot.opened) {
                cls += ` opened bg-${slot.reward}`;
                html = slot.reward;
            } else {
                // CLOSED STATE
                if (slot.hinted) {
                    cls += ' hinted';
                    html = `?<div class="hint-tag text-blue">A등급↑</div>`;
                } else {
                    html = (i + 1);
                    
                    // C-Neighbor Hint
                    let showGreen = false;
                    if(i % 8 > 0 && board[i-1].opened && board[i-1].reward === 'C') showGreen = true;
                    if(i % 8 < 7 && board[i+1].opened && board[i+1].reward === 'C') showGreen = true;

                    if(showGreen) {
                        html += `<div class="hint-tag text-green">B등급↑</div>`;
                    }
                }
                // Add click event only if closed
                div.onclick = () => openSlot(i);
            }
            div.className = cls;
            div.innerHTML = html;
            grid.appendChild(div);
        });
    }

    function updateHintGauge() {
        for(let i=1; i<=3; i++) {
            const seg = document.getElementById(`seg-${i}`);
            if(i <= hintCount) seg.classList.add('active');
            else seg.classList.remove('active');
        }
        
        const remaining = 3 - hintCount;
        let text = "";
        if(hintCount === 0) text = "0 / 3";
        else if(hintCount === 3) text = "READY!";
        else text = `${hintCount} / 3`;

        document.getElementById('hint-status').innerText = text;
    }

    // === Game Logic (Bug Fixed) ===
    function openSlot(i) {
        if(board[i].opened) return;
        
        if(myTickets < 30) {
            log("[ERROR] 이용권이 부족합니다.");
            // Stop AI if running
            if(isAutoRunning) toggleAI(); 
            return;
        }

        // 1. Deduct Ticket
        myTickets -= 30;
        updateDisplay();

        // 2. Update Board Data
        board[i].opened = true;
        const reward = board[i].reward;
        
        // 3. Stats Update
        totalStats[reward]++;
        totalOpens++;
        updateTotalStats();
        
        // 4. Hint Logic
        hintCount++;
        let triggerHint = false;
        if(hintCount >= 3) {
            hintCount = 0;
            triggerHint = true;
        }
        updateHintGauge();
        
        // 5. Apply Hint (Data only)
        if(triggerHint) {
            const targets = board.map((s, idx) => idx).filter(idx => !board[idx].opened && ['SSS','SS','S','A'].includes(board[idx].reward));
            if(targets.length > 0) {
                const t = targets[Math.floor(Math.random()*targets.length)];
                board[t].hinted = true;
                log("[HINT] A등급 이상 힌트 발동!");
            }
        }

        // 6. Final Render (Must be called to show opened slot)
        renderBoard();
        updateRemainCounts();

        // 7. Jackpot Check
        if(reward === 'SSS') {
            log(`★ JACKPOT! SSS 획득! ★`);
            if(isAutoRunning) {
                setTimeout(() => {
                    initBoard();
                    if(isAutoRunning && myTickets >= 30) setTimeout(runAILoop, 300);
                }, 800);
            } else {
                log("축하합니다! 초기화 버튼을 눌러주세요.");
            }
            return 'SSS';
        } else {
            log(`${i+1}번 오픈 -> [${reward}]`);
        }
        return reward;
    }

    // === AI Logic ===
    function toggleAI() {
        if(isAutoRunning) {
            isAutoRunning = false;
            document.getElementById('btn-ai').classList.remove('running');
            document.getElementById('btn-ai').innerHTML = 'AI 자동 정비<br><span style="font-size:0.8rem;">[OFF]</span>';
            log("[AI] 자동 정비가 중지되었습니다.");
        } else {
            isAutoRunning = true;
            document.getElementById('btn-ai').classList.add('running');
            document.getElementById('btn-ai').innerHTML = 'AI 작동 중...<br><span style="font-size:0.8rem;">[STOP]</span>';
            log("[AI] 자동 정비를 시작합니다.");
            runAILoop();
        }
    }

    function runAILoop() {
        if(!isAutoRunning) return;
        if(myTickets < 30) {
            log("[AI] 이용권 부족으로 중단");
            toggleAI();
            return;
        }

        let target = -1;
        
        // Priority 1: Hinted
        const hints = board.map((s,i)=>i).filter(i => s.hinted && !s.opened);
        if(hints.length > 0) target = hints[0];

        // Priority 2: C-Neighbor
        if(target === -1) {
            const cNeighbors = [];
            board.forEach((s, i) => {
                if(s.opened && s.reward === 'C') {
                    if(i%8 > 0 && !board[i-1].opened) cNeighbors.push(i-1);
                    if(i%8 < 7 && !board[i+1].opened) cNeighbors.push(i+1);
                }
            });
            if(cNeighbors.length > 0) target = cNeighbors[Math.floor(Math.random()*cNeighbors.length)];
        }

        // Priority 3: Random
        if(target === -1) {
            const unopened = board.map((s,i)=>i).filter(i => !s.opened);
            if(unopened.length === 0) {
                initBoard();
                setTimeout(runAILoop, 300);
                return;
            }
            target = unopened[Math.floor(Math.random()*unopened.length)];
        }

        const res = openSlot(target);
        if(res !== 'SSS') setTimeout(runAILoop, 150);
    }

    // === UI Updates ===
    function updateRemainCounts() {
        const counts = { SSS:0, SS:0, S:0, A:0, B:0, C:0 };
        board.forEach(s => { if(!s.opened) counts[s.reward]++; });
        for(let k in counts) document.getElementById(`cnt-${k}`).innerText = counts[k];
    }
    
    function updateTotalStats() {
        for(let k in totalStats) document.getElementById(`total-${k}`).innerText = totalStats[k].toLocaleString();
        document.getElementById('total-open-count').innerText = totalOpens.toLocaleString();
    }

    function resetTotal() {
        totalStats = { SSS:0, SS:0, S:0, A:0, B:0, C:0 };
        totalOpens = 0;
        updateTotalStats();
        log("[SYSTEM] 기록 초기화 완료.");
    }

    function resetBoard() { initBoard(); }

    function chargeFV() {
        const val = parseInt(document.getElementById('fv-input').value);
        if(val > 0) {
            myFV += val;
            document.getElementById('fv-input').value = '';
            updateDisplay();
            log(`[충전] ${val} FV 충전 완료`);
        }
    }
    function buyTicket(n) {
        const cost = n * 30;
        if(myFV >= cost) {
            myFV -= cost;
            myTickets += n;
            updateDisplay();
            log(`[구매] 이용권 ${n}장 구매 완료`);
        } else {
            log("[오류] FV가 부족합니다");
        }
    }
    function updateDisplay() {
        document.getElementById('fv-disp').innerText = myFV.toLocaleString();
        document.getElementById('ticket-disp').innerText = myTickets.toLocaleString();
    }
    function log(msg) {
        document.getElementById('log-text').innerText = msg;
    }

    // Start
    initBoard();
</script>

</body>
</html>
