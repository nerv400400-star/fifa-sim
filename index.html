<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REPAIR MASTER - FULL SPEC V4.6</title>
    <style>
        /* [1] CSS 변수 및 기본 초기화 */
        :root {
            --bg-body: #050505;
            --bg-panel: #161616;
            --border-panel: #333;
            --accent-yellow: #ffca28; 
            --accent-red: #d32f2f;
            --text-white: #fff;
            --col-SSS: #e040fb; /* 보라 */
            --col-SS: #ff6d00;  /* 주황 */
            --col-S: #ff1744;   /* 빨강 */
            --col-A: #2979ff;   /* 파랑 */
            --col-B: #00e676;   /* 초록 */
            --col-C: #616161;   /* 회색 */
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-white);
            font-family: 'Pretendard', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* [2] 헤더 디자인 */
        .header {
            height: 80px;
            background: #000;
            border-bottom: 4px solid var(--accent-red);
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            z-index: 100;
        }
        .header-title {
            font-family: 'Impact', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 3px 3px 0 #d32f2f;
        }
        .header-badge {
            background: #333;
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid #555;
        }

        /* [3] 메인 컨테이너 레이아웃 */
        .main-container {
            flex: 1;
            display: flex;
            padding: 30px;
            gap: 25px;
            justify-content: center;
            overflow-y: auto;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
        }

        .panel {
            background: var(--bg-panel);
            border: 2px solid var(--border-panel);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .panel-header {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ccc;
            border-left: 5px solid var(--accent-red);
            padding-left: 15px;
            text-transform: uppercase;
        }

        /* 좌측: 자산 및 상점 */
        .left-col { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; }
        .asset-box {
            background: #000; border: 2px solid #333; border-radius: 8px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .asset-val { font-size: 1.5rem; font-weight: 900; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .shop-btn {
            background: #222; border: 2px solid #444; padding: 15px 10px;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            cursor: pointer; border-radius: 6px; transition: 0.1s;
        }
        .shop-btn:hover { border-color: var(--accent-yellow); color: var(--accent-yellow); }
        .btn-act {
            width: 100%; background: #444; color: white; border: none; padding: 12px;
            font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 5px;
        }

        /* 중앙: 게임 영역 */
        .center-col { flex: 1; max-width: 900px; min-width: 750px; display: flex; flex-direction: column; gap: 20px; }
        .hint-dashboard {
            display: flex; align-items: center; justify-content: space-between;
            background: #000; border: 2px solid #444; border-radius: 10px; padding: 15px 25px;
        }
        .gauge-track {
            flex: 1; height: 20px; background: #222; border-radius: 10px; margin: 0 20px;
            display: flex; overflow: hidden; border: 1px solid #444;
        }
        .gauge-segment { flex: 1; border-right: 2px solid #000; background: #333; transition: 0.3s; }
        .gauge-segment.active { background: #40c4ff; box-shadow: 0 0 15px #40c4ff; }

        .game-frame {
            flex: 1; display: flex; gap: 20px;
            background: #1a1a1a; border: 2px solid #444; border-radius: 12px; padding: 25px;
        }
        
        /* [핵심] 그리드 및 슬롯 디자인 (화면 커짐 방지) */
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; flex: 1; }
        .slot {
            aspect-ratio: 1/1;
            background: #252525; border: 2px solid #3c3c3c; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; position: relative;
            font-family: 'Impact', sans-serif; font-size: 2rem; color: #555;
            transition: background 0.2s, border-color 0.2s;
        }
        .slot.hinted { border: 3px solid #40c4ff; color: #40c4ff; background: rgba(64, 196, 255, 0.1); }
        .slot.opened { cursor: default; border: 2px solid transparent; color: white; font-family: 'Pretendard', sans-serif; font-weight: 900; }
        
        /* 등급별 배경색 및 고정 폰트 크기 */
        .bg-SSS { background: var(--col-SSS) !important; border: 2px solid #fff !important; box-shadow: 0 0 20px var(--col-SSS) !important; font-size: 1.8rem !important; }
        .bg-SS  { background: var(--col-SS) !important; font-size: 1.8rem !important; }
        .bg-S   { background: var(--col-S) !important; font-size: 1.8rem !important; }
        .bg-A   { background: var(--col-A) !important; font-size: 1.8rem !important; }
        .bg-B   { background: var(--col-B) !important; color: #000 !important; font-size: 1.8rem !important; }
        .bg-C   { background: var(--col-C) !important; color: #aaa !important; font-size: 1.6rem !important; }

        .hint-tag { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 0.7rem; font-family: 'Pretendard', sans-serif; }
        .text-green { color: #00e676; } .text-blue { color: #40c4ff; }

        /* 사이드 컨트롤 */
        .side-controls { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        .remain-box { background: #000; border: 1px solid #444; padding: 15px; border-radius: 8px; }
        .remain-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; border-bottom: 1px solid #222; }
        .tag { padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; min-width: 40px; text-align: center; color: white; }
        .tag-SSS { background: var(--col-SSS); } .tag-SS { background: var(--col-SS); } .tag-S { background: var(--col-S); }
        .tag-A { background: var(--col-A); } .tag-B { background: var(--col-B); color: #000; } .tag-C { background: var(--col-C); }

        .btn-ai {
            width: 100%; background: #333; color: #888; font-weight: 900; font-size: 1.2rem;
            padding: 20px 0; border: 2px solid #555; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-ai.running {
            background: var(--accent-yellow); color: black; border-color: var(--accent-yellow);
            box-shadow: 0 0 15px rgba(255, 202, 40, 0.5); animation: pulseBtn 1.5s infinite;
        }
        @keyframes pulseBtn { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        /* 우측: 기록실 */
        .right-col { width: 250px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
        .history-item {
            background: #121212; padding: 12px; border-radius: 6px; border: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .log-area { background: #111; padding: 10px 20px; font-family: monospace; font-size: 0.9rem; color: #00e676; border-top: 2px solid #333; overflow: hidden; height: 45px; line-height: 25px; }

        /* [4] 모바일 최적화 */
        @media (max-width: 1100px) {
            body { height: auto; overflow-y: auto; }
            .main-container { flex-direction: column; padding: 15px; gap: 15px; }
            .center-col { order: 1; width: 100%; min-width: 0; }
            .left-col, .right-col { order: 2; width: 100%; }
            .game-frame { flex-direction: column-reverse; padding: 15px; }
            .side-controls { width: 100%; flex-direction: row; flex-wrap: wrap; }
            .remain-box { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
            .remain-row { margin-bottom: 0; }
            .shop-grid { grid-template-columns: repeat(4, 1fr); }
            .slot { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">REPAIR MASTER</div>
        <div class="header-badge">FULL SPEC V4.6</div>
    </div>

    <div class="main-container">
        <div class="left-col">
            <div class="panel">
                <div class="panel-header">WALLET</div>
                <div class="asset-box">
                    <span style="color:#888; font-weight:bold;">FV POINT</span>
                    <span class="asset-val" style="color:var(--col-S);" id="fv-disp">0</span>
                </div>
                <div class="asset-box" style="border-color:var(--accent-yellow);">
                    <span style="color:var(--accent-yellow); font-weight:bold;">TICKETS</span>
                    <span class="asset-val" style="color:var(--accent-yellow);" id="ticket-disp">0</span>
                </div>
                <input type="number" id="fv-input" class="input-dark" placeholder="FV 충전액 입력">
                <button class="btn-act" onclick="chargeFV()">충전하기</button>
            </div>

            <div class="panel">
                <div class="panel-header">SHOP</div>
                <div class="shop-grid">
                    <div class="shop-btn" onclick="buyTicket(1)"><span style="font-weight:900;">1장</span><span style="font-size:0.8rem; color:#888;">30FV</span></div>
                    <div class="shop-btn" onclick="buyTicket(10)"><span style="font-weight:900;">10장</span><span style="font-size:0.8rem; color:#888;">300FV</span></div>
                    <div class="shop-btn" onclick="buyTicket(100)"><span style="font-weight:900;">100장</span><span style="font-size:0.8rem; color:#888;">3,000FV</span></div>
                    <div class="shop-btn" onclick="buyTicket(1000)" style="border-color:var(--col-A);"><span style="font-weight:900; color:var(--col-A);">1,000장</span><span style="font-size:0.8rem; color:#888;">30,000</span></div>
                </div>
            </div>
        </div>

        <div class="center-col">
            <div class="hint-dashboard">
                <div style="color:#40c4ff; font-weight:bold; font-size:1.2rem;">⚡ HINT GAUGE</div>
                <div class="gauge-track">
                    <div class="gauge-segment" id="seg-1"></div>
                    <div class="gauge-segment" id="seg-2"></div>
                    <div class="gauge-segment" id="seg-3"></div>
                </div>
                <div id="hint-status" style="font-weight:bold; color:#888;">0 / 3</div>
            </div>

            <div class="game-frame">
                <div class="side-controls">
                    <div class="remain-box">
                        <div class="remain-row"><span class="tag tag-SSS">SSS</span> <span id="cnt-SSS">1</span></div>
                        <div class="remain-row"><span class="tag tag-SS">SS</span> <span id="cnt-SS">2</span></div>
                        <div class="remain-row"><span class="tag tag-S">S</span> <span id="cnt-S">3</span></div>
                        <div class="remain-row"><span class="tag tag-A">A</span> <span id="cnt-A">10</span></div>
                        <div class="remain-row"><span class="tag tag-B">B</span> <span id="cnt-B">12</span></div>
                        <div class="remain-row"><span class="tag tag-C">C</span> <span id="cnt-C">12</span></div>
                    </div>
                    <button class="btn-ai" id="btn-ai" onclick="toggleAI()">AI AUTO<br><span style="font-size:0.8rem;">[OFF]</span></button>
                    <button class="btn-act" style="margin-top:auto;" onclick="resetBoard()">판 초기화</button>
                </div>

                <div class="grid-wrapper">
                    <div class="grid-container" id="grid"></div>
                </div>
            </div>
            <div class="log-area" id="log-text">[SYSTEM] REPAIR MASTER READY.</div>
        </div>

        <div class="right-col">
            <div class="panel" style="height:100%;">
                <div class="panel-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>RECORDS</span>
                    <span style="font-size:0.7rem; cursor:pointer; text-decoration:underline;" onclick="resetTotal()">초기화</span>
                </div>
                <div style="flex:1;">
                    <div class="history-item" style="border-color:var(--col-SSS);"><span class="tag tag-SSS">SSS</span><span id="total-SSS" style="font-weight:bold; color:var(--col-SSS);">0</span></div>
                    <div class="history-item" style="border-color:var(--col-SS);"><span class="tag tag-SS">SS</span><span id="total-SS" style="font-weight:bold; color:var(--col-SS);">0</span></div>
                    <div class="history-item" style="border-color:var(--col-S);"><span class="tag tag-S">S</span><span id="total-S" style="font-weight:bold; color:var(--col-S);">0</span></div>
                    <div class="history-item" style="border-color:var(--col-A);"><span class="tag tag-A">A</span><span id="total-A" style="font-weight:bold;">0</span></div>
                    <div class="history-item" style="border-color:var(--col-B);"><span class="tag tag-B">B</span><span id="total-B" style="font-weight:bold;">0</span></div>
                    <div class="history-item" style="border-color:var(--col-C);"><span class="tag tag-C">C</span><span id="total-C" style="font-weight:bold;">0</span></div>
                </div>
                <div style="background:#000; padding:10px; border-radius:6px; border:1px solid #333;">
                    <div style="font-size:0.8rem; color:#888;">TOTAL OPENS</div>
                    <div style="font-size:1.5rem; font-weight:bold; text-align:right;" id="total-open-count">0</div>
                </div>
            </div>
        </div>
    </div>

<script>
    // [변수 설정]
    let myFV = 0, myTickets = 0;
    let board = [], hintCount = 0, isAutoRunning = false;
    let totalStats = { SSS:0, SS:0, S:0, A:0, B:0, C:0 }, totalOpens = 0;

    // [보드 초기화: 순환 C 방지]
    function initBoard() {
        let rewards = [...Array(1).fill('SSS'), ...Array(2).fill('SS'), ...Array(3).fill('S'), ...Array(10).fill('A'), ...Array(12).fill('B'), ...Array(12).fill('C')];
        let attempts = 0;
        while(true) {
            attempts++;
            for (let i = rewards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rewards[i], rewards[j]] = [rewards[j], rewards[i]];
            }
            let valid = true;
            for(let i=0; i<40; i++) {
                if(rewards[i] === 'C') {
                    if (rewards[(i-1+40)%40] === 'C' || rewards[(i+1)%40] === 'C') { valid = false; break; }
                }
            }
            if(valid || attempts > 5000) break;
        }
        board = rewards.map(r => ({ reward: r, opened: false, hinted: false }));
        hintCount = 0; updateHintGauge(); renderBoard(); updateRemainCounts();
        log("[SYSTEM] 보상판 재배치 완료.");
    }

    // [화면 렌더링]
    function renderBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        board.forEach((slot, i) => {
            const div = document.createElement('div');
            div.className = 'slot' + (slot.opened ? ' opened bg-' + slot.reward : (slot.hinted ? ' hinted' : ''));
            let html = slot.opened ? slot.reward : (i + 1);
            if (!slot.opened) {
                if (slot.hinted) html = `?<div class="hint-tag text-blue">A등급↑</div>`;
                else {
                    let prev = (i - 1 + 40) % 40, next = (i + 1) % 40;
                    if ((board[prev].opened && board[prev].reward === 'C') || (board[next].opened && board[next].reward === 'C')) {
                        html += `<div class="hint-tag text-green">B등급↑</div>`;
                    }
                }
                div.onclick = () => openSlot(i);
            }
            div.innerHTML = html;
            grid.appendChild(div);
        });
    }

    // [슬롯 오픈 로직]
    function openSlot(i) {
        if(board[i].opened) return;
        if(myTickets < 30) {
            log("[ERROR] 이용권 부족.");
            if(isAutoRunning) toggleAI();
            return;
        }

        // 1. 티켓 소모 및 상태 변경
        myTickets -= 30;
        board[i].opened = true;
        const reward = board[i].reward;
        
        // 2. 통계 및 힌트 카운트
        totalStats[reward]++; totalOpens++; hintCount++;
        let trigger = false;
        if(hintCount >= 3) { hintCount = 0; trigger = true; }

        // 3. 힌트 발동 (A등급 이상)
        if(trigger) {
            const targets = board.map((s, idx) => idx).filter(idx => !board[idx].opened && ['SSS','SS','S','A'].includes(board[idx].reward));
            if(targets.length > 0) board[targets[Math.floor(Math.random()*targets.length)]].hinted = true;
        }

        // 4. UI 갱신
        updateDisplay(); renderBoard(); updateRemainCounts(); updateTotalStats();

        // 5. 결과 처리 (SSS면 리셋, 아니면 AI 계속)
        if(reward === 'SSS') {
            log(`★ SSS 획득! ★`);
            if(isAutoRunning) {
                setTimeout(() => { initBoard(); if(isAutoRunning) setTimeout(runAILoop, 300); }, 800);
            }
            return 'SSS';
        } else {
            log(`${i+1}번 오픈 -> [${reward}]`);
            if(isAutoRunning) setTimeout(runAILoop, 150);
        }
        return reward;
    }

    // [AI 엔진]
    function toggleAI() {
        isAutoRunning = !isAutoRunning;
        const btn = document.getElementById('btn-ai');
        if(isAutoRunning) {
            btn.className = 'btn-ai running'; btn.innerHTML = 'AI AUTO<br><span>[STOP]</span>';
            log("[AI] 자동 정비 가동."); runAILoop();
        } else {
            btn.className = 'btn-ai'; btn.innerHTML = 'AI AUTO<br><span>[OFF]</span>';
            log("[AI] 자동 정비 중지.");
        }
    }

    function runAILoop() {
        if(!isAutoRunning || myTickets < 30) return;
        let target = -1;
        const hints = board.map((s,i)=>i).filter(i => board[i].hinted && !board[i].opened);
        if(hints.length > 0) target = hints[0];
        if(target === -1) {
            const cands = board.map((s,i)=>i).filter(i => {
                if(board[i].opened) return false;
                let p = (i-1+40)%40, n = (i+1)%40;
                return (board[p].opened && board[p].reward === 'C') || (board[n].opened && board[n].reward === 'C');
            });
            if(cands.length > 0) target = cands[Math.floor(Math.random()*cands.length)];
        }
        if(target === -1) {
            const un = board.map((s,i)=>i).filter(i => !board[i].opened);
            if(un.length > 0) target = un[Math.floor(Math.random()*un.length)];
        }
        if(target !== -1) openSlot(target);
    }

    // [유틸리티 함수]
    function updateHintGauge() {
        for(let i=1; i<=3; i++) document.getElementById(`seg-${i}`).className = 'gauge-segment' + (i <= hintCount ? ' active' : '');
        document.getElementById('hint-status').innerText = `${hintCount} / 3`;
    }
    function updateRemainCounts() {
        const c = {SSS:0,SS:0,S:0,A:0,B:0,C:0};
        board.forEach(s => { if(!s.opened) c[s.reward]++; });
        for(let k in c) document.getElementById(`cnt-${k}`).innerText = c[k];
    }
    function updateTotalStats() {
        for(let k in totalStats) document.getElementById(`total-${k}`).innerText = totalStats[k];
        document.getElementById('total-open-count').innerText = totalOpens;
    }
    function chargeFV() { let v = parseInt(document.getElementById('fv-input').value); if(v>0){ myFV += v; document.getElementById('fv-input').value=''; updateDisplay(); } }
    function buyTicket(n) { let c = n*30; if(myFV>=c){ myFV-=c; myTickets+=n; updateDisplay(); } }
    function updateDisplay() { document.getElementById('fv-disp').innerText = myFV.toLocaleString(); document.getElementById('ticket-disp').innerText = myTickets.toLocaleString(); }
    function log(m) { document.getElementById('log-text').innerText = m; }
    function resetTotal() { totalStats={SSS:0,SS:0,S:0,A:0,B:0,C:0}; totalOpens=0; updateTotalStats(); }
    function resetBoard() { initBoard(); }

    initBoard();
</script>
</body>
</html>
